version: "3.8"

services:
  ai-service:
    build: ./ai-python
    ports:
      - "8000:8000"
    networks:
      - backend-net
      - frontend-net
    restart: always

  backend:
    build: ./backend-spring
    ports:
      - "8080:8080"
    environment:
      - AI_URL=http://ai-service:8000
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - ai-service
    networks:
      - frontend-net
      - backend-net
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - frontend-net
    restart: always

networks:
  frontend-net:
    driver: bridge
  backend-net:
    internal: true
